name: Secret Test

on:
  workflow_dispatch:   # <-- YE ADD KIYA (manual trigger)
  push:
    branches: [ main ]

jobs:
  test-secret:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Read secret safely
        run: |
          if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "The secret is set: true"
          else
            echo "The secret is set: false"
          fi
      
      - name: TRY to print secret directly
        run: |
          echo "Secret value: ${{ secrets.MY_SECRET_MESSAGE }}"
