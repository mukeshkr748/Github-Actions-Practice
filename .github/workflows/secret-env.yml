name: Secret as Environment Variable

on:
  workflow_dispatch:

jobs:
  env-test:
    runs-on: ubuntu-latest
    steps:
      - name: Use Secret as Env Variable
        env:
          MY_SECRET: ${{ secrets.MY_SECRET_MESSAGE }}
        run: |
          echo "Secret length: ${#MY_SECRET}"
          echo "First 3 chars: ${MY_SECRET:0:3}"
          
      - name: Direct check (safe)
        run: |
          if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "✅ Secret is available"
          fi
