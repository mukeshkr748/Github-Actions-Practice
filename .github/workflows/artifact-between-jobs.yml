name: Artifact Between Jobs

on:
  workflow_dispatch:

jobs:
  # JOB 1: File generate karo
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Create data file
        run: |
          echo "Hello from Job 1!" > data.txt
          echo "Current time: $(date)" >> data.txt
          echo "Random number: $RANDOM" >> data.txt
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-data
          path: data.txt

  # JOB 2: File download karo aur print karo
  consume:
    runs-on: ubuntu-latest
    needs: generate  # <-- Job 1 complete hone ka wait karega
    steps:
      - name: Download artifact from Job 1
        uses: actions/download-artifact@v4
        with:
          name: shared-data
          
      - name: Print file contents
        run: |
          echo "📄 File contents from Job 1:"
          cat data.txt
