name: Artifact Upload Demo

on:
  workflow_dispatch:

jobs:
  generate-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Create test report file
        run: |
          echo "Test Report - $(date)" > test-report.txt
          echo "======================" >> test-report.txt
          echo "All 10 tests passed ✅" >> test-report.txt
          echo "Coverage: 95%" >> test-report.txt
          echo "Time taken: 2.3s" >> test-report.txt
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.txt
